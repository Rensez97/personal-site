# Cloudflare WORKER (with static assets). This project deploys via
# `wrangler deploy` (Cloudflare migrated it from Pages to a Worker — the
# dashboard shows "Version command" and a broken bindings button, both
# Worker-model tells). Rather than fight that, we lean into it:
#
#   - ./site is served directly by Cloudflare's edge static assets.
#   - worker/index.js runs ONLY for the /api/* routes, reusing the handlers
#     in functions/api/* so the logic isn't duplicated.
#   - Bindings are declared here (the dashboard "Add binding" button silently
#     fails for this project). See docs/runbook.md §I2.

name = "personal-site"
main = "worker/index.js"
compatibility_date = "2026-07-01"

[assets]
directory = "./site"
binding = "ASSETS"

# D1 database for the contact form + run counter (functions/api/*).
[[d1_databases]]
binding = "DB"
database_name = "site-db"
database_id = "2bd3fd17-686e-4751-adc3-f2640879d522"

# Service binding to the notification Worker (workers/email-notify/), which
# holds the send_email binding this Worker can't hold itself.
[[services]]
binding = "EMAIL"
service = "site-email-notify"
