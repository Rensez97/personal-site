# The daily pipeline the colophon describes: dlt -> dbt -> DuckDB in CI,
# committing one Parquet file (+ the JSON the page reads) back to the repo.
# Cloudflare Pages picks the commit up and redeploys the static site.
name: daily-pipeline

on:
  schedule:
    - cron: "20 4 * * *" # every morning, 04:20 UTC — runs while I sleep
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install
        run: pip install -r pipeline/requirements.txt

      - name: Extract + load (dlt)
        run: python pipeline/extract_load.py

      - name: Transform + test (dbt)
        working-directory: pipeline/dbt
        run: dbt build --profiles-dir .

      - name: Export (DuckDB -> json + parquet)
        run: python pipeline/export.py

      - name: Commit fresh data
        run: |
          git config user.name "pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/metrics.json site/data/metrics.parquet pipeline/history/stars.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push
          fi
